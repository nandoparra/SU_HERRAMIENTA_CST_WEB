# Railway / Nixpacks — dependencias del sistema para Puppeteer (whatsapp-web.js)
# Usa nixPkgs (no aptPkgs) — en Ubuntu 22.04 el paquete apt chromium-browser
# es un snap y no funciona en contenedores sin snapd.
[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "cups",
  "libdrm",
  "mesa",
  "xorg.libX11",
  "glib",
  "at-spi2-atk",
  "atk",
  "cairo",
  "pango",
  "alsa-lib",
  "expat",
  "nspr",
  "gdk-pixbuf",
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/run/current-system/sw/bin/chromium"

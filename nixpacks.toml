# Railway / Nixpacks — librerías del sistema para Puppeteer (whatsapp-web.js)
# Puppeteer descarga su propio Chrome durante npm install (no lo bloqueamos).
# Solo instalamos las librerías del sistema que ese Chrome necesita en Railway.
[phases.setup]
aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2",
  "libx11-6",
  "libxcb1",
  "libxext6",
  "fonts-liberation",
]

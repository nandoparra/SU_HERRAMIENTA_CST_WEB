<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SU HERRAMIENTA CST</title>
  <link rel="stylesheet" href="/assets/dashboard.css">
  <script src="/assets/tenant-init.js"></script>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-img"><img src="/assets/logo.png" alt="Logo" class="logo-wrap-img"></div>
    <div class="sb-logo-text" data-tenant-name>SU HERRAMIENTA CST</div>
  </div>
  <nav class="sb-nav">
    <div class="nav-item active" data-view="inicio" onclick="navigate('inicio')">
      <span class="ni">🏠</span><span>Inicio</span>
    </div>
    <div class="nav-item" data-view="ordenes" onclick="navigate('ordenes')">
      <span class="ni">📋</span><span>Órdenes</span>
    </div>
    <div class="nav-item" data-view="cotizaciones" onclick="navigate('cotizaciones')">
      <span class="ni">💰</span><span>Cotizaciones</span>
    </div>
    <div class="nav-item" data-view="clientes" onclick="navigate('clientes')">
      <span class="ni">👥</span><span>Clientes</span>
    </div>
    <div class="nav-item" data-view="funcionarios" onclick="navigate('funcionarios')">
      <span class="ni">👨‍💼</span><span>Funcionarios</span>
    </div>
    <div class="nav-item" data-view="inventario" onclick="navigate('inventario')">
      <span class="ni">📦</span><span>Inventario</span>
    </div>
    <div class="nav-item" data-view="recibos" onclick="navigate('recibos')">
      <span class="ni">🧾</span><span>Recibos</span>
    </div>
    <div class="nav-item" data-view="ventas" onclick="navigate('ventas')">
      <span class="ni">🛒</span><span>Ventas</span>
    </div>
    <div class="nav-item nueva-orden-nav" onclick="navigate('nuevaOrden')">
      <span class="ni">➕</span><span>Nueva Orden</span>
    </div>
    <div class="nav-item" data-view="misOrdenes" onclick="navigate('misOrdenes')" style="display:none;">
      <span class="ni">🔧</span><span>Mis Órdenes</span>
    </div>
    <div class="nav-item" data-view="buscarOrden" onclick="navigate('buscarOrden')" style="display:none;">
      <span class="ni">🔍</span><span>Buscar Orden</span>
    </div>
  </nav>
  <div class="sb-footer">
    <div class="sb-user" id="sidebarUser"></div>
    <button class="sb-logout" onclick="doLogout()">⏏ Cerrar sesión</button>
  </div>
</aside>

<!-- ── Sidebar overlay (mobile) ── -->
<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

<!-- ── Main area ── -->
<div class="main-area">
  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <span class="topbar-title" id="topbarTitle">Inicio</span>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="btn-nueva-orden" onclick="navigate('nuevaOrden')">+ Nueva Orden</button>
    </div>
  </div>
  <div id="viewContainer"></div>
</div>

<div id="_toast"></div>

<!-- Modal: Cotizar máquina -->
<div id="cotizarModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);align-items:center;justify-content:center;">
  <div style="background:#fff;width:92%;max-width:1140px;height:90vh;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #e5e7eb;">
      <span id="cotizarModalTitle" style="font-weight:600;font-size:15px">Cotizar máquina</span>
      <button onclick="cerrarModalCotizar()" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;color:#666">✕</button>
    </div>
    <iframe id="cotizarIframe" src="" style="flex:1;border:none;"></iframe>
  </div>
</div>

<!-- Modal agregar máquina a orden existente -->
<div id="agregarMaquinaModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);align-items:center;justify-content:center;">
  <div style="background:#fff;width:94%;max-width:520px;border-radius:12px;overflow:hidden;max-height:90vh;display:flex;flex-direction:column;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #e5e7eb;flex-shrink:0;">
      <span style="font-weight:600;font-size:15px;">Agregar máquina a la orden</span>
      <button onclick="ord_cerrarAgregarMaquina()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#666;">✕</button>
    </div>
    <div style="padding:16px;overflow-y:auto;flex:1;">
      <div class="no-fgroup">
        <label>Máquinas del cliente</label>
        <select id="amSelectMaquina" style="width:100%;" onchange="ord_onSelectMaquina(this)">
          <option value="">-- Cargando... --</option>
        </select>
      </div>
      <div id="amObsRow" style="display:none;" class="no-fgroup">
        <label>Observaciones de recepción</label>
        <textarea id="amObservaciones" rows="3" style="width:100%;resize:vertical;" placeholder="Descripción del problema, falla reportada..."></textarea>
      </div>
      <div id="amSeparador" style="text-align:center;margin:12px 0;color:#999;font-size:13px;">— o —</div>
      <button id="amBtnNueva" class="no-toggle-link" style="width:100%;text-align:center;" onclick="ord_toggleNuevaMaquina()">+ Crear nueva máquina</button>
      <div id="amNuevaForm" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #e5e7eb;">
        <div class="no-grid2">
          <div class="no-fgroup"><label>Nombre <span class="no-req">*</span></label><input id="amNombre" type="text" placeholder="Ej: Taladro, Esmeril..."></div>
          <div class="no-fgroup"><label>Marca</label><input id="amMarca" type="text" placeholder="Bosch, DeWalt..."></div>
          <div class="no-fgroup"><label>Serial</label><input id="amSerial" type="text"></div>
          <div class="no-fgroup"><label>Referencia</label><input id="amRef" type="text"></div>
        </div>
        <div class="no-fgroup">
          <label>Observaciones de recepción</label>
          <textarea id="amNuevaObs" rows="3" style="width:100%;resize:vertical;" placeholder="Descripción del problema..."></textarea>
        </div>
        <div id="amNuevaError" class="no-alert-err" style="display:none;"></div>
      </div>
      <!-- Bloque garantía por máquina -->
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid #e5e7eb;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="amChkGarantia" onchange="am_toggleGarantia(this.checked)"
            style="width:16px;height:16px;cursor:pointer;accent-color:var(--dark);flex-shrink:0;">
          <span style="font-size:13px;font-weight:600;">¿Esta máquina está en garantía?</span>
          <span style="font-size:11px;font-weight:700;background:#c0392b;color:#fff;padding:1px 7px;border-radius:4px;letter-spacing:.3px;">GARANTÍA</span>
        </label>
        <div id="amGarantiaFields" style="display:none;margin-top:10px;">
          <div class="no-fgroup">
            <label>Fecha de vencimiento <span class="no-req">*</span></label>
            <input type="date" id="amGarantiaVence" style="max-width:200px;">
          </div>
          <div class="no-fgroup" style="margin-top:8px;">
            <label>Factura de compra (PDF) <span style="font-size:11px;color:#888;">— opcional</span></label>
            <label class="upload-foto-btn" id="amFacturaLabel">📄 Seleccionar PDF
              <input type="file" id="amFacturaFile" accept=".pdf" style="display:none"
                onchange="am_onFacturaChange(this)">
            </label>
          </div>
        </div>
      </div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;">
      <button class="btn btn-grey" onclick="ord_cerrarAgregarMaquina()">Cancelar</button>
      <button id="amBtnAgregar" class="btn btn-dark" onclick="ord_confirmarAgregarMaquina()" disabled>Agregar a la orden</button>
    </div>
      </div>
    </div>
  </div>
</div>

<script src="/assets/dashboard.js"></script>
</body>
</html>

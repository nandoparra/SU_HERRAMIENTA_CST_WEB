<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SU HERRAMIENTA CST — Nueva Orden</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;}
    header{background:var(--color-primary, #1d3557);color:#fff;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;}
    header h1{font-size:15px;font-weight:600;}
    .nav-links{display:flex;gap:12px;align-items:center;}
    .nav-links a{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;}
    .nav-links a:hover{color:#fff;}
    .logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:13px;}

    .container{max-width:860px;margin:28px auto;padding:0 16px 48px;}

    /* Steps */
    .steps{display:flex;gap:0;margin-bottom:28px;}
    .step{flex:1;text-align:center;padding:12px 8px;font-size:13px;font-weight:600;color:#aaa;border-bottom:3px solid #ddd;cursor:default;}
    .step.active{color:var(--color-primary, #1d3557);border-color:var(--color-primary, #1d3557);}
    .step.done{color:#4CAF50;border-color:#4CAF50;}

    .card{background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:24px;margin-bottom:16px;}
    h2{font-size:16px;color:var(--color-primary, #1d3557);margin-bottom:16px;}
    h3{font-size:14px;color:#333;margin-bottom:12px;}

    label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;}
    input,select,textarea{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;transition:border .2s;font-family:inherit;}
    input:focus,select:focus,textarea:focus{border-color:#457b9d;}
    textarea{resize:vertical;min-height:70px;}
    .req{color:#e74c3c;}

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
    .form-group{margin-bottom:12px;}

    button{padding:9px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;}
    .btn-primary{background:var(--color-primary, #1d3557);color:#fff;}
    .btn-primary:hover{background:#457b9d;}
    .btn-primary:disabled{background:#aaa;cursor:not-allowed;}
    .btn-secondary{background:#f0f4f8;color:#333;border:1px solid #ddd;}
    .btn-secondary:hover{background:#e2e8f0;}
    .upload-foto-btn{display:inline-flex;align-items:center;gap:5px;margin-top:4px;padding:5px 10px;background:#f0f4f8;border:1px dashed #aac;border-radius:6px;font-size:12px;color:#457b9d;cursor:pointer;}
    .upload-foto-btn:hover{background:#e8f4fd;}
    .btn-success{background:#4CAF50;color:#fff;}
    .btn-success:hover{background:#388E3C;}
    .btn-danger{background:#e74c3c;color:#fff;padding:5px 10px;font-size:12px;}
    .btn-sm{padding:5px 12px;font-size:12px;}

    .search-row{display:flex;gap:8px;margin-bottom:12px;}
    .search-row input{flex:1;}

    .result-item{padding:10px 14px;border:1px solid #e8e8e8;border-radius:6px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s;}
    .result-item:hover{background:#f0f4f8;}
    .result-item.selected{background:#e8f4fd;border-color:#457b9d;}
    .result-name{font-weight:600;font-size:13px;color:var(--color-primary, #1d3557);}
    .result-sub{font-size:11px;color:#888;margin-top:2px;}

    .selected-client-card{background:#e8f4fd;border:1px solid #457b9d;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
    .selected-client-card .name{font-weight:700;color:var(--color-primary, #1d3557);font-size:14px;}
    .selected-client-card .sub{font-size:12px;color:#555;margin-top:2px;}

    .maq-item{border:1px solid #e8e8e8;border-radius:8px;padding:14px;margin-bottom:10px;background:#fafafa;}
    .maq-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .maq-nombre{font-weight:700;font-size:13px;color:var(--color-primary, #1d3557);}
    .maq-sub{font-size:11px;color:#888;}

    .foto-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
    .foto-thumb{position:relative;width:80px;height:80px;border-radius:6px;overflow:hidden;border:1px solid #ddd;}
    .foto-thumb img{width:100%;height:100%;object-fit:cover;}
    .foto-thumb .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    .divider{border:none;border-top:1px solid #eee;margin:16px 0;}
    .alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:12px;}
    .alert-error{background:#fdecea;color:#c0392b;}
    .alert-success{background:#e8f5e9;color:#2e7d32;}
    .muted{font-size:12px;color:#888;}
    .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}

    .section-toggle{background:none;border:none;color:var(--color-primary, #1d3557);font-size:13px;font-weight:600;cursor:pointer;padding:0;text-decoration:underline;}

    .order-success{text-align:center;padding:32px;}
    .order-success .num{font-size:48px;font-weight:800;color:var(--color-primary, #1d3557);}
    .order-success .label{font-size:15px;color:#666;margin-bottom:20px;}
    .order-success .maq-list{text-align:left;max-width:400px;margin:0 auto 24px;}

    @media(max-width:768px){
      header{padding:10px 14px;}
      header h1{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;}
      .nav-links a{display:none;}
      #headerUser{display:none;}
    }
    @media(max-width:600px){
      .container{padding:0 12px;margin:16px auto;}
      .grid2,.grid3{grid-template-columns:1fr;}
      .steps{gap:0;}
      .step{font-size:11px;padding:9px 4px;}
      .nav-row{flex-direction:column;gap:8px;}
      .nav-row button{width:100%;}
    }
  </style>
  <script src="/assets/tenant-init.js"></script>
</head>
<body>

<header>
  <h1>🔧 SU HERRAMIENTA CST — Nueva Orden de Servicio</h1>
  <div class="nav-links">
    <a href="/generador-cotizaciones.html">← Cotizaciones</a>
    <a href="/ordenes.html">Órdenes</a>
    <span id="headerUser" style="font-size:13px;opacity:.8;"></span>
    <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
  </div>
</header>

<div class="container">

  <!-- Steps -->
  <div class="steps">
    <div class="step active" id="step1-tab">1. Cliente</div>
    <div class="step" id="step2-tab">2. Máquinas</div>
    <div class="step" id="step3-tab">3. Confirmar</div>
  </div>

  <!-- ═══════════ STEP 1: CLIENTE ═══════════ -->
  <div id="step1">
    <div class="card">
      <h2>Buscar cliente</h2>
      <div class="search-row">
        <input id="clientSearch" type="text" placeholder="Cédula, NIT, nombre o teléfono..." oninput="buscarCliente()">
      </div>
      <div id="clientResults"></div>

      <div id="selectedClientCard" style="display:none;"></div>

      <hr class="divider">
      <button class="section-toggle" onclick="toggleNewClient()">+ Crear nuevo cliente</button>

      <div id="newClientForm" style="display:none;margin-top:16px;">
        <h3>Nuevo cliente</h3>
        <div class="grid2">
          <div class="form-group">
            <label>Identificación <span class="req">*</span></label>
            <input id="nc_id" type="text" placeholder="Cédula o NIT" inputmode="numeric"
              oninput="this.value=this.value.replace(/[^0-9]/g,'')" onblur="sugerirClave()">
          </div>
          <div class="form-group">
            <label>Razón Social <span class="req">*</span></label>
            <input id="nc_nombre" type="text" placeholder="Nombre o empresa">
          </div>
        </div>
        <div class="grid2">
          <div class="form-group">
            <label>Teléfono <span class="req">*</span></label>
            <input id="nc_tel" type="text" inputmode="numeric" placeholder="Teléfono"
              oninput="this.value=this.value.replace(/[^0-9\s\/\-]/g,'')">
          </div>
          <div class="form-group">
            <label>Dirección</label>
            <input id="nc_dir" type="text" placeholder="Dirección">
          </div>
        </div>
        <div class="grid2">
          <div class="form-group">
            <label>Contacto</label>
            <input id="nc_contacto" type="text" placeholder="Nombre del contacto">
          </div>
          <div class="form-group">
            <label>Teléfono Contacto</label>
            <input id="nc_tel_contacto" type="text" inputmode="numeric" placeholder="Teléfono contacto"
              oninput="this.value=this.value.replace(/[^0-9\s\/\-]/g,'')">
          </div>
        </div>
        <div class="form-group" style="max-width:200px;">
          <label>Clave asignada <span class="req">*</span></label>
          <input id="nc_clave" type="text" placeholder="Últimos 4 dígitos">
          <div class="muted" style="margin-top:4px;">Por defecto: últimos 4 dígitos de la identificación</div>
        </div>
        <div id="newClientError" class="alert alert-error" style="display:none;"></div>
        <button class="btn-primary" onclick="crearCliente()">Crear cliente</button>
      </div>
    </div>

    <div class="nav-row" style="display:flex;justify-content:flex-end;">
      <button class="btn-primary" id="btnStep1Next" onclick="goStep2()" disabled>Siguiente →</button>
    </div>
  </div>

  <!-- ═══════════ STEP 2: MÁQUINAS ═══════════ -->
  <div id="step2" style="display:none;">
    <div class="card">
      <div id="step2ClientCard"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h2 style="margin:0;">Máquinas en esta orden</h2>
        <button class="btn-primary" onclick="abrirModalMaquina()">+ Agregar máquina</button>
      </div>
      <div id="maquinasEnOrden"></div>
    </div>

    <div class="nav-row" style="display:flex;justify-content:space-between;margin-top:8px;">
      <button class="btn-secondary" onclick="goStep1()">← Atrás</button>
      <button class="btn-primary" id="btnStep2Next" onclick="goStep3()" disabled>Siguiente →</button>
    </div>
  </div>

  <!-- Modal agregar máquina -->
  <div id="modalMaquina" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);align-items:center;justify-content:center;">
    <div style="background:#fff;width:94%;max-width:520px;border-radius:12px;overflow:hidden;max-height:90vh;display:flex;flex-direction:column;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #e5e7eb;">
        <span style="font-weight:600;font-size:15px;">Agregar máquina a la orden</span>
        <button onclick="cerrarModalMaquina()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#666;">✕</button>
      </div>
      <div style="padding:16px;overflow-y:auto;">
        <!-- Selector máquinas existentes -->
        <div id="mm_selectRow" class="form-group">
          <label>Máquinas del cliente</label>
          <select id="mm_select" style="width:100%;" onchange="onSelectMaquinaModal(this)">
            <option value="">-- Seleccionar máquina --</option>
          </select>
        </div>
        <!-- Observaciones para máquina existente -->
        <div id="mm_obsRow" style="display:none;" class="form-group">
          <label>Observaciones de recepción</label>
          <textarea id="mm_obs" rows="3" style="width:100%;resize:vertical;" placeholder="Estado visible, falla reportada, accesorios..."></textarea>
        </div>
        <!-- Separador -->
        <div id="mm_separador" style="text-align:center;margin:12px 0;color:#999;font-size:13px;">— o —</div>
        <!-- Toggle nueva máquina -->
        <button id="mm_btnNueva" class="section-toggle" style="width:100%;text-align:center;" onclick="toggleNuevaMaqModal()">+ Crear nueva máquina</button>
        <div id="mm_nuevaForm" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #e5e7eb;">
          <div class="grid2">
            <div class="form-group">
              <label>Nombre <span class="req">*</span></label>
              <input id="mm_nombre" type="text" placeholder="Ej: Taladro, Esmeril...">
            </div>
            <div class="form-group">
              <label>Marca</label>
              <input id="mm_marca" type="text" placeholder="Bosch, DeWalt...">
            </div>
            <div class="form-group">
              <label>Serial</label>
              <input id="mm_serial" type="text" placeholder="Número de serie">
            </div>
            <div class="form-group">
              <label>Referencia</label>
              <input id="mm_ref" type="text" placeholder="Referencia del modelo">
            </div>
          </div>
          <div class="form-group">
            <label>Observaciones de recepción</label>
            <textarea id="mm_nuevaObs" rows="3" style="width:100%;resize:vertical;" placeholder="Estado visible, falla reportada, accesorios..."></textarea>
          </div>
          <div id="mm_error" class="alert alert-error" style="display:none;"></div>
        </div>
        <!-- Bloque garantía por máquina -->
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #e5e7eb;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="mm_chkGarantia" onchange="mm_toggleGarantia(this.checked)"
              style="width:16px;height:16px;cursor:pointer;flex-shrink:0;">
            <span style="font-size:13px;font-weight:600;">¿Esta máquina está en garantía?</span>
            <span style="font-size:11px;font-weight:700;background:#c0392b;color:#fff;padding:1px 7px;border-radius:4px;letter-spacing:.3px;">GARANTÍA</span>
          </label>
          <div id="mm_garantiaFields" style="display:none;margin-top:10px;">
            <div class="form-group">
              <label>Fecha de vencimiento <span class="req">*</span></label>
              <input type="date" id="mm_garantiaVence" style="max-width:200px;">
            </div>
            <div class="form-group" style="margin-top:8px;">
              <label>Factura de compra (PDF) <span style="font-size:11px;color:#888;">— opcional</span></label>
              <label class="upload-foto-btn" id="mm_facturaLabel" style="display:inline-block;padding:6px 12px;background:#f0f4f8;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:12px;">📄 Seleccionar PDF
                <input type="file" id="mm_facturaFile" accept=".pdf" style="display:none"
                  onchange="mm_onFacturaChange(this)">
              </label>
            </div>
          </div>
        </div>
      </div>
      <div style="padding:12px 16px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px;">
        <button class="btn-secondary" onclick="cerrarModalMaquina()">Cancelar</button>
        <button id="mm_btnAgregar" class="btn-primary" onclick="confirmarAgregarMaquina()" disabled>Agregar a la orden</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ STEP 3: CONFIRMAR ═══════════ -->
  <div id="step3" style="display:none;">
    <div class="card">
      <h2>Confirmar orden</h2>
      <div id="resumenOrden"></div>

      <div id="step3Error" class="alert alert-error" style="display:none;margin-top:12px;"></div>
    </div>
    <div class="nav-row" style="display:flex;justify-content:space-between;">
      <button class="btn-secondary" onclick="goStep2()">← Atrás</button>
      <button class="btn-success" id="btnCrear" onclick="crearOrden()">✓ Crear Orden</button>
    </div>
  </div>

  <!-- ═══════════ ÉXITO ═══════════ -->
  <div id="stepSuccess" style="display:none;">
    <div class="card order-success">
      <div style="font-size:40px;">✅</div>
      <div class="num" id="successConsecutivo"></div>
      <div class="label">Orden creada exitosamente</div>

      <div class="maq-list" id="successMaqList"></div>

        <div id="ordenAcciones"></div>

      <hr class="divider">
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn-primary" onclick="window.location.href='/generador-cotizaciones.html'">Ir a Cotizaciones</button>
        <button class="btn-secondary" onclick="nuevaOrden()">Nueva Orden</button>
      </div>
    </div>
  </div>

</div>

<script src="/assets/crear-orden.js"></script>
</body>
</html>
